name: Deploy Docs

on:
  push:
    branches:
      - docs-dev

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs-dev
        uses: actions/checkout@v4
        with:
          ref: docs-dev
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs and save landing page
        run: |
          rm -rf /tmp/bolt-cowork-site /tmp/bolt-cowork-landing
          mkdir -p /tmp/bolt-cowork-landing
          cp -r docs/landing/. /tmp/bolt-cowork-landing/
          mkdocs build --site-dir /tmp/bolt-cowork-site/docs
          rm -rf /tmp/bolt-cowork-site/docs/landing

      - name: Deploy docs and landing page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages
          git checkout -B gh-pages origin/gh-pages
          rm -rf docs
          cp -r /tmp/bolt-cowork-site/docs ./docs
          cp -r /tmp/bolt-cowork-landing/. .
          touch .nojekyll
          git add docs index.html .nojekyll
          git diff --staged --quiet || git commit -m "deploy: update docs"
          git push origin gh-pages
