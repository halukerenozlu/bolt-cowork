name: Deploy Docs

on:
  push:
    branches:
      - docs-dev
    paths:
      - "docs/**"
      - "mkdocs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs-dev
        uses: actions/checkout@v4
        with:
          ref: docs-dev
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --dirty

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp docs/landing/index.html /tmp/landing.html
          rm -rf docs/
          mkdir -p docs
          cp -r docs-site/* docs/
          cp /tmp/landing.html index.html
          git add -A
          git diff --staged --quiet || git commit -m "deploy: update site"
          git push origin gh-pages
